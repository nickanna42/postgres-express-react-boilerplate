services:
  frontend:
    build: 
      context: ./
      dockerfile: dockerfiles/frontend_dev.Dockerfile
    environment:
      - CHOKIDAR_USEPOLLING=true
      - DEV_SERVER_PROXY=http://server:5000
    volumes:
      - ./frontend/src:/app/src
    ports:
      - 3000:3000
    networks:
      - boilerplate_network
    depends_on:
      - migration
  
  server:
    build:
      context: ./
      dockerfile: dockerfiles/server_dev.Dockerfile
    volumes:
      - ./server/src:/app/server/src
    ports:
      - 5000:5000
    networks:
      - boilerplate_network
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=password
      - DB_DATABASE=mydatabase
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
    ports:
      - 5432:5432
    networks:
      - boilerplate_network
    volumes:
      - ./data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration:
    build:
      context: ./
      dockerfile: dockerfiles/migration.Dockerfile
    networks:
      - boilerplate_network
    environment:
      - DATABASE_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy

networks:
  boilerplate_network:
    driver: bridge